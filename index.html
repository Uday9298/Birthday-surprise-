<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Birthday Surprise 🎂</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:Arial;
text-align:center;
overflow:hidden;
}

#start{
position:absolute;
top:40%;
width:100%;
font-size:35px;
cursor:pointer;
}

#main{
display:none;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
height:100vh;
}

h1{
padding-top:30px;
font-size:45px;
text-shadow:0 0 20px red;
}

img{
width:300px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

/* cake */

.cake{
font-size:80px;
cursor:pointer;
transition:0.5s;
animation:bounce 2s infinite;
}

@keyframes bounce{
0%{transform:translateY(0)}
50%{transform:translateY(-15px)}
100%{transform:translateY(0)}
}

/* hearts */

.heart{
position:absolute;
color:#ff2e63;
animation:float 6s linear infinite;
}

@keyframes float{
from{transform:translateY(100vh)}
to{transform:translateY(-10vh)}
}

/* balloons */

.balloon{
position:absolute;
font-size:40px;
animation:fly 8s linear infinite;
}

@keyframes fly{
from{transform:translateY(100vh)}
to{transform:translateY(-10vh)}
}

/* confetti */

.confetti{
position:absolute;
width:8px;
height:8px;
animation:fall 4s linear infinite;
}

@keyframes fall{
from{transform:translateY(-10vh)}
to{transform:translateY(100vh)}
}

/* fireworks */

.firework{
position:absolute;
width:6px;
height:6px;
border-radius:50%;
animation:explode 1s linear infinite;
}

@keyframes explode{
from{transform:scale(1);opacity:1}
to{transform:scale(8);opacity:0}
}

</style>
</head>

<body>

<div id="start" onclick="startSurprise()">
✨ Tap here for birthday surprise ✨
</div>

<div id="main">

<h1>🎉 Happy Birthday Chandamama 💖</h1>

<div class="cake" id="cake" onclick="cutCake()">🎂</div>

<br>

<img id="slide" src="photo1.jpg">

<p>Wishing you happiness and beautiful memories ✨</p>

<audio id="music" autoplay loop>
<source src="birthday.mp3" type="audio/mpeg">
</audio>

</div>

<script>

function startSurprise(){
document.getElementById("start").style.display="none";
document.getElementById("main").style.display="block";
document.getElementById("music").play();
}

/* cake cutting */

function cutCake(){

let cake=document.getElementById("cake");

cake.innerHTML="🍰";

cake.style.transform="scale(1.5)";

setTimeout(()=>{
cake.style.transform="scale(1)";
},600);

}

/* slideshow */

let images=["photo1.jpg","photo2.jpg","photo3.jpg","photo4.jpg"];
let i=0;

setInterval(()=>{
i=(i+1)%images.length;
document.getElementById("slide").src=images[i];
},2500);

/* hearts */

setInterval(()=>{
let heart=document.createElement("div");
heart.innerHTML="❤";
heart.className="heart";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(20+Math.random()*30)+"px";
document.body.appendChild(heart);
setTimeout(()=>heart.remove(),6000);
},500);

/* balloons */

setInterval(()=>{
let b=document.createElement("div");
b.className="balloon";
b.innerHTML="🎈";
b.style.left=Math.random()*100+"vw";
document.body.appendChild(b);
setTimeout(()=>b.remove(),8000);
},1500);

/* confetti */

setInterval(()=>{
let c=document.createElement("div");
c.className="confetti";
c.style.left=Math.random()*100+"vw";
c.style.background="hsl("+Math.random()*360+"deg,100%,50%)";
document.body.appendChild(c);
setTimeout(()=>c.remove(),4000);
},200);

/* fireworks */

setInterval(()=>{
let f=document.createElement("div");
f.className="firework";
f.style.left=Math.random()*100+"vw";
f.style.top=Math.random()*80+"vh";
f.style.background="hsl("+Math.random()*360+"deg,100%,50%)";
document.body.appendChild(f);
setTimeout(()=>f.remove(),1000);
},400);

</script>

</body>
</html>
