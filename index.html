<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Birthday Surprise</title>

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
color:white;
overflow:hidden;
}

/* screens */

.screen{
display:none;
height:100vh;
justify-content:center;
align-items:center;
flex-direction:column;
}

.active{
display:flex;
}

/* title animation */

.title{
font-size:45px;
animation:fadeIn 2s ease-in-out;
}

@keyframes fadeIn{
from{opacity:0; transform:scale(0.8)}
to{opacity:1; transform:scale(1)}
}

/* slideshow */

img{
width:280px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.4);
margin-top:20px;
}

/* cake */

.cake{
font-size:80px;
cursor:pointer;
animation:bounce 2s infinite;
}

@keyframes bounce{
0%{transform:translateY(0)}
50%{transform:translateY(-15px)}
100%{transform:translateY(0)}
}

/* button */

button{
padding:12px 25px;
border:none;
border-radius:25px;
background:#ff4081;
color:white;
font-size:18px;
cursor:pointer;
margin-top:20px;
}

/* floating hearts */

.heart{
position:absolute;
color:#ff2e63;
animation:float 6s linear infinite;
}

@keyframes float{
from{transform:translateY(100vh)}
to{transform:translateY(-10vh)}
}

/* confetti */

.confetti{
position:absolute;
width:8px;
height:8px;
animation:fall 4s linear infinite;
}

@keyframes fall{
from{transform:translateY(-10vh)}
to{transform:translateY(100vh)}
}

</style>
</head>

<body>

<!-- Screen 0 -->

<div id="screen0" class="screen active">
<h1 class="title">✨ Tap here for surprise ✨</h1>
<button onclick="start()">Start</button>
</div>

<!-- Screen 1 -->

<div id="screen1" class="screen">
<h1 class="title">🎉 Happy Birthday My Chandamama 💖</h1>
<button onclick="next1()">Next</button>
</div>

<!-- Screen 2 -->

<div id="screen2" class="screen">
<h2>Moments of the birthday queen 👑</h2>
<img id="slide" src="photo1.jpg">
<button onclick="next2()">Next</button>
</div>

<!-- Screen 3 -->

<div id="screen3" class="screen">
<h2>Cut the Cake 🎂</h2>
<div class="cake" id="cake" onclick="cutCake()">🎂</div>
</div>

<!-- Screen 4 -->

<div id="screen4" class="screen">
<h1>Hope this made your day special 💖</h1>
</div>

<audio autoplay loop>
<source src="birthday.mp3" type="audio/mpeg">
</audio>

<script>

/* start */

function start(){
document.getElementById("screen0").classList.remove("active");
document.getElementById("screen1").classList.add("active");
}

/* next screens */

function next1(){
document.getElementById("screen1").classList.remove("active");
document.getElementById("screen2").classList.add("active");
}

function next2(){
document.getElementById("screen2").classList.remove("active");
document.getElementById("screen3").classList.add("active");
}

/* cake cut */

function cutCake(){
let cake=document.getElementById("cake");
cake.innerHTML="🍰";

setTimeout(()=>{
document.getElementById("screen3").classList.remove("active");
document.getElementById("screen4").classList.add("active");
},1500);
}

/* slideshow */

let images=["photo1.jpg","photo2.jpg","photo3.jpg","photo4.jpg"];
let i=0;

setInterval(()=>{
i=(i+1)%images.length;
document.getElementById("slide").src=images[i];
},2500);

/* floating hearts */

setInterval(()=>{
let heart=document.createElement("div");
heart.innerHTML="❤";
heart.className="heart";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(18+Math.random()*25)+"px";
document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);

},600);

/* confetti */

setInterval(()=>{
let c=document.createElement("div");
c.className="confetti";
c.style.left=Math.random()*100+"vw";
c.style.background="hsl("+Math.random()*360+"deg,100%,50%)";

document.body.appendChild(c);

setTimeout(()=>{
c.remove();
},4000);

},300);

</script>

</body>
</html>
